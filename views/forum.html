<style id="navDropdownInlineFix">
.nav-links .nav-dropdown{
    position:relative !important;
    display:inline-flex !important;
    align-items:center !important;
}

.nav-links .nav-dropdown::after{
    content:"" !important;
    position:absolute !important;
    top:100% !important;
    right:0 !important;
    width:max(100%, 220px) !important;
    height:12px !important;
    display:block !important;
    pointer-events:auto !important;
    z-index:9998 !important;
}
.nav-links .nav-dropdown-toggle{
    appearance:none !important;
    -webkit-appearance:none !important;
    border:none !important;
    border-radius:999px !important;
    background:#1f2428 !important;
    color:#fff !important;
    font:inherit !important;
    font-weight:600 !important;
    padding:9px 14px !important;
    cursor:pointer !important;
    display:inline-flex !important;
    align-items:center !important;
    gap:6px !important;
    line-height:1 !important;
}
.nav-links .nav-dropdown.active .nav-dropdown-toggle,
.nav-links .nav-dropdown:hover .nav-dropdown-toggle,
.nav-links .nav-dropdown:focus-within .nav-dropdown-toggle{
    background:#5865F2 !important;
    color:#fff !important;
}
.nav-links .nav-dropdown-menu{
    display:none !important;
    position:absolute !important;
    top:calc(100% + 8px) !important;
    right:0 !important;
    min-width:220px !important;
    background:#23272a !important;
    border:1px solid rgba(255,255,255,.10) !important;
    border-radius:14px !important;
    box-shadow:0 14px 38px rgba(0,0,0,.50) !important;
    padding:8px !important;
    z-index:9999 !important;
}
.nav-links .nav-dropdown:hover .nav-dropdown-menu,
.nav-links .nav-dropdown:focus-within .nav-dropdown-menu{
    display:flex !important;
    flex-direction:column !important;
    gap:5px !important;
}
.nav-links .nav-dropdown-menu a{
    display:block !important;
    width:auto !important;
    margin:0 !important;
    padding:10px 12px !important;
    border-radius:10px !important;
    background:transparent !important;
    color:#fff !important;
    text-decoration:none !important;
    white-space:nowrap !important;
    text-align:left !important;
}
.nav-links .nav-dropdown-menu a:hover,
.nav-links .nav-dropdown-menu a.active{
    background:#5865F2 !important;
    color:#fff !important;
}
.nav-dropdown-arrow{
    font-size:12px !important;
}
@media(max-width:700px){
    .nav-links .nav-dropdown{
        width:100% !important;
    }
    .nav-links .nav-dropdown-toggle{
        width:100% !important;
        justify-content:center !important;
    }
    .nav-links .nav-dropdown-menu{
        position:static !important;
        width:100% !important;
        margin-top:6px !important;
        box-shadow:none !important;
    }
}
</style>


<style id="navDropdownPreciseHoverFix">
/* Mehr-Dropdown: öffnet nur noch über den echten Mehr-Button */
.nav-links .nav-dropdown::after{
    content:none !important;
    display:none !important;
}

.nav-links .nav-dropdown:hover .nav-dropdown-menu{
    display:none !important;
}

.nav-links .nav-dropdown.open .nav-dropdown-menu,
.nav-links .nav-dropdown:focus-within .nav-dropdown-menu{
    display:flex !important;
    flex-direction:column !important;
    gap:5px !important;
}

.nav-links .nav-dropdown:hover .nav-dropdown-toggle{
    background:#1f2428 !important;
    color:#fff !important;
}

.nav-links .nav-dropdown.active .nav-dropdown-toggle,
.nav-links .nav-dropdown.open .nav-dropdown-toggle,
.nav-links .nav-dropdown:focus-within .nav-dropdown-toggle,
.nav-links .nav-dropdown:has(> .nav-dropdown-toggle:hover) .nav-dropdown-toggle{
    background:#5865F2 !important;
    color:#fff !important;
}

.nav-links .nav-dropdown-menu{
    top:calc(100% + 6px) !important;
    right:auto !important;
    left:0 !important;
}
</style>

<script id="navDropdownPreciseHoverScript">
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".nav-dropdown").forEach(dropdown => {
        const button = dropdown.querySelector(".nav-dropdown-toggle");
        const menu = dropdown.querySelector(".nav-dropdown-menu");
        let closeTimer = null;

        if (!button || !menu) return;

        const openMenu = () => {
            window.clearTimeout(closeTimer);
            dropdown.classList.add("open");
        };

        const scheduleClose = () => {
            window.clearTimeout(closeTimer);
            closeTimer = window.setTimeout(() => {
                dropdown.classList.remove("open");
            }, 280);
        };

        button.addEventListener("mouseenter", openMenu);
        button.addEventListener("focus", openMenu);

        dropdown.addEventListener("mouseenter", () => {
            if (dropdown.classList.contains("open")) {
                window.clearTimeout(closeTimer);
            }
        });

        dropdown.addEventListener("mouseleave", scheduleClose);

        button.addEventListener("click", event => {
            event.preventDefault();
            event.stopPropagation();

            if (dropdown.classList.contains("open")) {
                dropdown.classList.remove("open");
            } else {
                document.querySelectorAll(".nav-dropdown.open").forEach(other => {
                    if (other !== dropdown) other.classList.remove("open");
                });
                openMenu();
            }
        });

        document.addEventListener("click", event => {
            if (!dropdown.contains(event.target)) {
                dropdown.classList.remove("open");
            }
        });

        menu.addEventListener("click", event => {
            if (event.target.closest("a")) {
                dropdown.classList.remove("open");
            }
        });
    });
});
</script>


<script src="assets/user-menu.js?v=9"></script>

<script id="adminNavVisibilityScript">
document.addEventListener("DOMContentLoaded", async () => {
    const isDetail = /\/tasks\/[^/]+\/?$/.test(window.location.pathname);
    const prefix = isDetail ? "../" : "";

    try {
        const response = await fetch(`${prefix}api/admin/permissions?t=${Date.now()}`);
        if (!response.ok) return;

        const data = await response.json();

        if (data.canViewAdmin) {
            document.querySelectorAll(".admin-only-link").forEach(link => {
                link.classList.remove("hidden");
            });
        }
    } catch (_) {}
});
</script>
